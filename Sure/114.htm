			<tr>
				<td style="WIDTH: 1px;vertical-align:top" class="TableCellBackColor">1.</td>
				<td class="TableCellBackColor" style="vertical-align:top">Reci: “Tražim zaštitu u Gospodara
					ljudi,
				</td>
			</tr>
			<tr>
				<td style="WIDTH: 1px;vertical-align:top" class="TableCellBackColor">2.</td>
				<td class="TableCellBackColor" style="vertical-align:top">Vladara ljudi,<div class="FusNota" onclick="CopyToClipboard(this.fus_nota);" onmouseover="doTooltip(event, this.getAttribute('fus_nota'))" onmouseout="hideTip()"
						fus_nota="114:2 Allahov Poslanik a.s. je rekao: “Na Dan kijameta Allah &#263;e držati &#269;itavu Zemlju i smota&#263;e nebo desnicom Svojom i re&#263;i: “Ja sam vladar. Gdje su vladari Zemlje?” (Sahih El-Buhari)">*</div>
				</td>
			</tr>
			<tr>
				<td style="WIDTH: 1px;vertical-align:top" class="TableCellBackColor">3.</td>
				<td class="TableCellBackColor" style="vertical-align:top">Boga ljudi,
				</td>
			</tr>
			<tr>
				<td style="WIDTH: 1px;vertical-align:top" class="TableCellBackColor">4.</td>
				<td class="TableCellBackColor" style="vertical-align:top">Od zla došaptavanja hannasa,<div class="FusNota" onclick="CopyToClipboard(this.fus_nota);" onmouseover="doTooltip(event, this.getAttribute('fus_nota'))" onmouseout="hideTip()"
						fus_nota="114:4 *Hannas - epitet za šejtana koji se povla&#269;i pri spomenu imena Allaha.Allahov Poslanik a.s. je rekao: “Vatra je opkoljena svim vrstama želja i strasti, dok je Džennet opkoljen svim vrstama nepoželjnih stvari.” (Sahih El-Buhari)Neumjerene želje i animalisti&#269;ke strasti vode u vatru, dok samokontrola, ustrajnost, &#269;estitost i druge vrline i poslušnost Allahu i Njegovom poslaniku Muhammedu a.s. vode u Džennet. Ono što vodi ka Džehennemu lahko se &#269;ini, a ono što vodi u Džennet teško se &#269;ini.">*</div>
				</td>
			</tr>
			<tr>
				<td style="WIDTH: 2px;vertical-align:top" class="TableCellBackColor">5.</td>
				<td class="TableCellBackColor" style="vertical-align:top">Koji došaptava u grudi ljudi,</td>
			</tr>
			<tr>
				<td style="WIDTH: 2px;vertical-align:top" class="TableCellBackColor">6.</td>
				<td class="TableCellBackColor" style="vertical-align:top">Od džinna i ljudi.”
				</td>
			</tr>
