			<tr>
				<td style="WIDTH: 1px;vertical-align:top" class="TableCellBackColor">1.</td>
				<td class="TableCellBackColor" style="vertical-align:top">Reci: “Tražim zaštitu u Gospodara
					svitanja,<div class="FusNota" onclick="CopyToClipboard(this.fus_nota);" onmouseover="doTooltip(event, this.getAttribute('fus_nota'))" onmouseout="hideTip()"
						fus_nota="113:1 Gospodar cijepanja zore: Onaj koji donosi svjetlo jutra odvajaju&#263;i ga od tame no&#263;i.">*</div>
				</td>
			</tr>
			<tr>
				<td style="WIDTH: 1px;vertical-align:top" class="TableCellBackColor">2.</td>
				<td class="TableCellBackColor" style="vertical-align:top">Od zla onog šta stvara,
				</td>
			</tr>
			<tr>
				<td style="WIDTH: 1px;vertical-align:top" class="TableCellBackColor">3.</td>
				<td class="TableCellBackColor" style="vertical-align:top">I od zla tame kad zamra&#269;i,
				</td>
			</tr>
			<tr>
				<td style="WIDTH: 1px;vertical-align:top" class="TableCellBackColor">4.</td>
				<td class="TableCellBackColor" style="vertical-align:top">I od zla onih koje pušu u &#269;vorove,<div class="FusNota" onclick="CopyToClipboard(this.fus_nota);" onmouseover="doTooltip(event, this.getAttribute('fus_nota'))" onmouseout="hideTip()"
						fus_nota="113:4 ’Neffasati fil ukad’ su one žene, ili grupe, ili duše koje, u vrijeme &#269;aranja ili bajanja, pušu u zavezane uzlove ili &#269;vorove: kose, dlake, užad ili žile, izgovaraju&#263;i magi&#269;ne formule. Puhanje u uzlove je bio raširen oblik vradžbine u predislamskoj Arabiji. Žene bi vezale &#269;vorove na užetu i puhale u njih sa proklinjanjem. ">*</div>
				</td>
			</tr>
			<tr>
				<td style="WIDTH: 2px;vertical-align:top" class="TableCellBackColor">5.</td>
				<td class="TableCellBackColor" style="vertical-align:top">I od zla zavidnika kad zavidi!”</td>
			</tr>
